<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="D-Shop">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/shop.png">
    <title>D-Shop PH - Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overscroll-behavior: none; padding-bottom: 80px; }
        .safe-top { padding-top: env(safe-area-inset-top, 20px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .cart-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; font-size: 11px; color: #9ca3af; }
        .nav-item.active { color: #2563eb; }
        .status-bar { height: 4px; border-radius: 2px; overflow: hidden; background: #e5e7eb; }
        .status-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 12px; z-index: 100; font-size: 14px; animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; display: flex; align-items: flex-end; justify-content: center; }
        .modal-sheet { background: white; border-radius: 24px 24px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; }
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="safe-top bg-blue-600 text-white p-4 sticky top-0 z-40 shadow-lg">
        <div class="flex items-center justify-between">
            <a href="index.html" class="text-white/80 text-sm">← Home</a>
            <h1 class="text-lg font-bold">🛒 D-Shop PH</h1>
            <button onclick="openCart()" class="relative p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
                <span id="cart-badge" class="cart-badge hidden">0</span>
            </button>
        </div>
    </header>

    <main class="p-4">
        <div id="active-order-banner" class="hidden mb-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white p-4 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-sm" id="active-order-status">⏳ Preparing...</span>
                <span class="text-xs bg-white/20 px-2 py-1 rounded-full" id="active-order-id">#---</span>
            </div>
            <div class="status-bar mb-2">
                <div id="active-order-bar" class="status-bar-fill bg-white" style="width: 25%"></div>
            </div>
            <p class="text-xs text-white/80" id="active-order-detail">Your order is being prepared</p>
        </div>

        <div class="mb-4">
            <input type="text" id="search-input" oninput="filterMenu()" placeholder="🔍 Search menu..." class="w-full p-3 bg-white rounded-xl shadow-sm border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex gap-2 overflow-x-auto mb-4 pb-2" id="category-pills">
            <button onclick="filterByCategory('all')" class="category-pill active bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">All</button>
        </div>

        <div id="menu-grid" class="space-y-3">
            <div class="text-center py-12 text-gray-400">
                <div class="text-4xl mb-2">🍽️</div>
                <p>Loading menu...</p>
            </div>
        </div>

        <section id="orders-section" class="mt-6 hidden">
            <h2 class="text-xl font-bold mb-3">My Orders</h2>
            <div id="orders-list" class="space-y-3"></div>
        </section>
    </main>

    <nav class="bottom-nav safe-bottom">
        <div class="flex max-w-lg mx-auto">
            <button onclick="showPage('menu')" class="nav-item active" id="nav-menu">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                Menu
            </button>
            <button onclick="showPage('orders')" class="nav-item" id="nav-orders">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Orders
            </button>
            <button onclick="openCart()" class="nav-item" id="nav-cart">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                Cart
            </button>
        </div>
    </nav>

    <div id="cart-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeCart()">
        <div class="modal-sheet slide-up">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="text-lg font-bold">🛒 Your Cart</h3>
                <button onclick="closeCart()" class="text-gray-400 text-2xl leading-none">&times;</button>
            </div>
            <div id="cart-items" class="p-4 space-y-3 min-h-[200px]">
                <p class="text-center text-gray-400 py-8">Your cart is empty</p>
            </div>
            <div class="p-4 border-t bg-gray-50">
                <div class="flex justify-between text-sm text-gray-500 mb-1">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">₱0</span>
                </div>
                <div class="flex justify-between text-sm text-gray-500 mb-2">
                    <span>Delivery Fee</span>
                    <span id="cart-delivery">₱40</span>
                </div>
                <div class="flex justify-between text-lg font-bold mb-4">
                    <span>Total</span>
                    <span id="cart-total" class="text-blue-600">₱0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg active:bg-blue-700 transition">Checkout</button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeCheckout()">
        <div class="modal-sheet slide-up p-6">
            <h3 class="text-lg font-bold mb-4">📍 Delivery Details</h3>
            <input id="checkout-name" type="text" placeholder="Your Full Name" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input id="checkout-phone" type="tel" placeholder="Phone Number (09XXXXXXXXX)" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <textarea id="checkout-address" placeholder="Complete Delivery Address" rows="3" class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            <div class="bg-blue-50 p-3 rounded-xl mb-4">
                <p class="text-sm text-blue-700">💳 Payment: <strong>Cash on Delivery</strong></p>
            </div>
            <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg active:bg-green-700 transition">Place Order</button>
            <button onclick="closeCheckout()" class="w-full text-gray-500 py-3 mt-2">Cancel</button>
        </div>
    </div>

    <script>
        const client = new Appwrite.Client();
        client.setEndpoint('https://sgp.cloud.appwrite.io/v1').setProject('6a5099d00031731cad59');
        const databases = new Appwrite.Databases(client);
        const DB_ID = '6a509abf002aed29dd40';
        const SETTINGS_DOC_ID = 'YOUR_SETTINGS_DOC_ID';

        let cart = [];
        let deliveryFee = 40;
        let allMenuItems = [];
        let activeOrderUnsubscribe = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function loadMenu() {
            try {
                const res = await databases.listDocuments(DB_ID, 'menu_items', [
                    Appwrite.Query.equal('is_available', true)
                ]);
                allMenuItems = res.documents;
                renderMenu(allMenuItems);
                renderCategories(allMenuItems);
            } catch (err) {
                console.error(err);
                document.getElementById('menu-grid').innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        <div class="text-4xl mb-2">😕</div>
                        <p>Failed to load menu</p>
                        <button onclick="loadMenu()" class="mt-2 text-blue-600 text-sm">Tap to retry</button>
                    </div>`;
            }
        }

        function renderCategories(items) {
            const cats = [...new Set(items.map(i => i.category).filter(Boolean))];
            const container = document.getElementById('category-pills');
            container.innerHTML = `<button onclick="filterByCategory('all')" class="category-pill bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">All</button>` +
                cats.map(c => `<button onclick="filterByCategory('${c}')" class="category-pill bg-white text-gray-600 border px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">${c}</button>`).join('');
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.category-pill').forEach(p => { p.className = p.className.replace('bg-blue-600 text-white', 'bg-white text-gray-600 border'); });
            event.target.className = event.target.className.replace('bg-white text-gray-600 border', 'bg-blue-600 text-white');
            const filtered = cat === 'all' ? allMenuItems : allMenuItems.filter(i => i.category === cat);
            renderMenu(filtered);
        }

        function filterMenu() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allMenuItems.filter(i => i.name.toLowerCase().includes(q) || (i.description||'').toLowerCase().includes(q));
            renderMenu(filtered);
        }

        function renderMenu(items) {
            const grid = document.getElementById('menu-grid');
            if (items.length === 0) {
                grid.innerHTML = '<div class="text-center py-12 text-gray-400"><div class="text-4xl mb-2">🔍</div><p>No items found</p></div>';
                return;
            }
            grid.innerHTML = items.map(item => {
                const inCart = cart.find(c => c.id === item.$id);
                return `
                <div class="bg-white p-3 rounded-2xl shadow-sm flex gap-3 fade-in border border-gray-100">
                    <img src="${item.image_url || 'https://via.placeholder.com/100?text=🍽️'}" class="w-24 h-24 rounded-xl object-cover flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-base truncate">${item.name}</h3>
                        <p class="text-xs text-gray-400 truncate">${item.description || ''}</p>
                        <span class="inline-block text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full mt-1">${item.category || 'Food'}</span>
                        <div class="flex justify-between items-center mt-2">
                            <span class="font-bold text-blue-600 text-lg">₱${item.price}</span>
                            ${inCart ? `
                                <div class="flex items-center gap-2">
                                    <button onclick="updateQty('${item.$id}', -1)" class="qty-btn bg-gray-200 text-gray-700">−</button>
                                    <span class="font-bold w-6 text-center">${inCart.qty}</span>
                                    <button onclick="updateQty('${item.$id}', 1)" class="qty-btn bg-blue-600 text-white">+</button>
                                </div>
                            ` : `
                                <button onclick="addToCart('${item.$id}', '${item.name.replace(/'/g,"\\'")}', ${item.price})" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold active:bg-blue-700">Add</button>
                            `}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(id, name, price) {
            cart.push({ id, name, price, qty: 1 });
            updateCartUI();
            renderMenu(getCurrentFilteredItems());
            showToast(`${name} added to cart`);
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
            renderMenu(getCurrentFilteredItems());
        }

        function getCurrentFilteredItems() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const activePill = document.querySelector('.category-pill.bg-blue-600');
            const cat = activePill ? activePill.textContent.trim() : 'All';
            let items = allMenuItems;
            if (cat !== 'All') items = items.filter(i => i.category === cat);
            if (q) items = items.filter(i => i.name.toLowerCase().includes(q));
            return items;
        }

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            const badge = document.getElementById('cart-badge');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);

            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-subtotal').innerText = `₱${subtotal}`;
            document.getElementById('cart-total').innerText = `₱${subtotal + (count > 0 ? deliveryFee : 0)}`;

            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-8">Your cart is empty</p>';
            } else {
                container.innerHTML = cart.map(i => `
                    <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium truncate">${i.name}</p>
                            <p class="text-sm text-blue-600 font-bold">₱${i.price * i.qty}</p>
                        </div>
                        <div class="flex items-center gap-2 ml-3">
                            <button onclick="updateQty('${i.id}', -1)" class="qty-btn bg-gray-200 text-gray-700">−</button>
                            <span class="font-bold w-6 text-center">${i.qty}</span>
                            <button onclick="updateQty('${i.id}', 1)" class="qty-btn bg-blue-600 text-white">+</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function openCart() { document.getElementById('cart-modal').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); }

        function checkout() {
            if (cart.length === 0) return showToast('Cart is empty!');
            closeCart();
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }

        async function placeOrder() {
            const name = document.getElementById('checkout-name').value.trim();
            const phone = document.getElementById('checkout-phone').value.trim();
            const address = document.getElementById('checkout-address').value.trim();
            if (!name || !address) return showToast('Please fill in your name and address');

            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const total = subtotal + deliveryFee;

            try {
                const order = await databases.createDocument(DB_ID, 'orders', Appwrite.ID.unique(), {
                    customer_name: name,
                    delivery_address: `${address} | 📞 ${phone}`,
                    total_amount: total,
                    status: 'pending',
                    items_json: JSON.stringify(cart)
                });

                closeCheckout();
                showToast('✅ Order placed!');
                cart = [];
                updateCartUI();
                renderMenu(getCurrentFilteredItems());
                trackOrder(order.$id);
            } catch (err) {
                console.error(err);
                showToast('❌ Failed to place order');
            }
        }

        function trackOrder(orderId) {
            const banner = document.getElementById('active-order-banner');
            banner.classList.remove('hidden');
            document.getElementById('active-order-id').innerText = `#${orderId.substring(0, 8)}`;
            document.getElementById('orders-section').classList.remove('hidden');
            showPage('orders');

            if (activeOrderUnsubscribe) activeOrderUnsubscribe();

            activeOrderUnsubscribe = client.subscribe(`documents.${orderId}`, (res) => {
                const order = res.payload;
                const stages = {
                    'pending':          { pct: 10,  emoji: '⏳', text: 'Waiting for rider...', bar: 'bg-yellow-400' },
                    'preparing':        { pct: 35,  emoji: '🍳', text: 'Food is being prepared', bar: 'bg-orange-400' },
                    'out_for_delivery': { pct: 70,  emoji: '🛵', text: 'Rider is on the way!', bar: 'bg-blue-400' },
                    'delivered':        { pct: 100, emoji: '✅', text: 'Delivered! Enjoy your meal', bar: 'bg-green-400' }
                };
                const stage = stages[order.status] || stages['pending'];

                document.getElementById('active-order-status').innerText = `${stage.emoji} ${order.status.replace(/_/g, ' ')}`;
                document.getElementById('active-order-detail').innerText = stage.text;
                const bar = document.getElementById('active-order-bar');
                bar.style.width = stage.pct + '%';
                bar.className = `status-bar-fill ${stage.bar}`;

                if (order.status === 'delivered') {
                    showToast('🎉 Order delivered!');
                    setTimeout(() => banner.classList.add('hidden'), 10000);
                }
            });
        }

        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
            if (page === 'menu') {
                document.getElementById('menu-grid').parentElement.classList.remove('hidden');
                document.getElementById('orders-section').classList.add('hidden');
            } else if (page === 'orders') {
                document.getElementById('orders-section').classList.remove('hidden');
            }
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        loadMenu();
    </script>
</body>
</html>
