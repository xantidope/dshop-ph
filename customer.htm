<main class="p-4 max-w-md mx-auto">
  <div class="bg-white rounded-lg flex items-center gap-2 px-3 py-2 shadow-sm border border-slate-100 mb-4">
    <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
    <input id="searchInput" type="text" placeholder="Search Adobo, Sisig..." class="flex-1 bg-transparent text-sm w-full outline-none"/>
  </div>

  <div class="flex gap-2 overflow-x-auto pb-2 mb-4 no-scrollbar" id="cats"></div>

  <div id="menu" class="space-y-4"></div>

  <div id="ordersView" class="hidden space-y-4">
    <h2 class="font-bold text-xl">My Orders</h2>
    <div id="orderList"></div>
    <button onclick="showMenu()" class="w-full py-2 text-sm text-slate-500">← Back to Menu</button>

<div id="cartBar" class="sticky-cart">
  <div class="flex justify-between items-center mb-2">
    <span class="font-bold"><span id="cartCount">0</span> items</span>

<script>
const DB_KEY = 'dshop_orders';
const MENU_KEY = 'dshop_menu';

const DEFAULT_MENU = [
  {id:1, name:'Tapsilog', price:120, cat:'silog', desc:'Beef tapa, garlic rice, egg', img:'https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=500'},
  {id:2, name:'Crispy Chicken', price:185, cat:'chicken', desc:'2 pcs crispy chicken with rice', img:'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=500'},
  {id:3, name:'Sisig', price:160, cat:'beef', desc:'Crispy pork face with onions', img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500'},
  {id:4, name:'Pancit Canton', price:95, cat:'noodles', desc:'Stir-fried noodles', img:'https://images.unsplash.com/photo-1612874742237-6526221588e3?w=500'},
  {id:5, name:'Halo-Halo', price:85, cat:'dessert', desc:'Mixed ice dessert', img:'https://images.unsplash.com/photo-1490474418585-ba9bad8fd0ea?w=500'},
  {id:6, name:'Mango Shake', price:65, cat:'drinks', desc:'Fresh mango smoothie', img:'https://images.unsplash.com/photo-1546793665-c74683f339c1?w=500'}
];

let cart = [];
let menu = JSON.parse(localStorage.getItem(MENU_KEY)) || DEFAULT_MENU;
let customerOrders = [];
let activeCat = 'all';
let customerName = localStorage.getItem('customerName') || '';

// Firebase listener
if (db) {
  db.collection('menu').onSnapshot((snapshot) => {
    menu = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
    localStorage.setItem(MENU_KEY, JSON.stringify(menu));
    renderMenu();
  });

  const customerQuery = customerName ? 
    db.collection('orders').where('customer', '==', customerName).orderBy('time', 'desc') :
    db.collection('orders').orderBy('time', 'desc').limit(10);
    
  customerQuery.onSnapshot((snapshot) => {
    customerOrders = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
    updateOrderBadge();
    if(!document.getElementById('ordersView').classList.contains('hidden')) {
      renderOrders();
    }
  });
} else {
  window.addEventListener('storage', (e) => {
    if(e.key === DB_KEY) {
      loadLocalOrders();
      renderOrders();
    }
  });
}

function loadLocalOrders() {
  const allOrders = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  customerOrders = customerName ? 
    allOrders.filter(o => o.customer === customerName) : 
    allOrders.slice(0, 10);
}

function updateOrderBadge() {
  const activeOrders = customerOrders.filter(o => o.status !== 'delivered').length;
  const badge = document.getElementById('orderBadge');
  if(activeOrders > 0) {
    badge.textContent = activeOrders;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function renderCats(){
  const cats = ['all', ...new Set(menu.map(m => m.cat))];
  document.getElementById('cats').innerHTML = cats.map(c => 
    `<button onclick="setCat('${c}')" class="px-4 py-1.5 rounded-full text-xs font-bold border whitespace-nowrap ${activeCat===c?'bg-orange-500 text-white border-orange-500':'bg-white text-slate-600 border-slate-200'}">${c.toUpperCase()}</button>`
  ).join('');
}

function setCat(c){ activeCat=c; renderCats(); renderMenu(); }

function renderMenu(){
  renderCats();
  const grid = document.getElementById('menu');
  let items = menu;
  if(activeCat !== 'all') items = items.filter(i=>i.cat===activeCat);
  
  grid.innerHTML = items.map(i => `
    <div class="bg-white p-3 rounded-xl border border-slate-100 flex gap-3">
      <img src="${i.img}" class="w-20 h-20 rounded-lg object-cover bg-slate-100" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22%3E%3Crect fill=%22%23f1f5f9%22 width=%2280%22 height=%2280%22/%3E%3Ctext x=%2240%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2212%22%3ENo Image%3C/text%3E%3C/svg%3E'">
      <div class="flex-1">
        <h3 class="font-bold text-sm">${i.name}</h3>
        <p class="text-xs text-slate-500 mb-2">${i.desc || 'Delicious local food'}</p>
        <div class="flex justify-between items-center">
          <span class="font-bold text-orange-600">₱${i.price}</span>
          <button onclick="addToCart(${i.id})" class="bg-orange-100 text-orange-600 w-8 h-8 rounded-full flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function addToCart(id){
  const item = menu.find(i=>i.id===id);
  const exist = cart.find(c=>c.id===id);
  if(exist) exist.qty++; else cart.push({...item, qty:1});
  updateCart();
}

function updateCart(){
  const count = cart.reduce((a,b)=>a+b.qty,0);
  const total = cart.reduce((a,b)=>a+(b.price*b.qty),0) + 49;
  document.getElementById('cartCount').innerText = count;
  document.getElementById('cartTotal').innerText = '₱'+total;
  const bar = document.getElementById('cartBar');
  if(count>0) bar.classList.add('visible'); else bar.classList.remove('visible');
}

async function checkout(){
  if(!customerName) {
    customerName = prompt("Enter your name:");
    if(!customerName) return;
    localStorage.setItem('customerName', customerName);
  }
  
  const address = prompt("Delivery address:");
  if(!address) return;
  
  const order = {
    customer: customerName,
    address: address,
    items: cart,
    total: cart.reduce((a,b)=>a+(b.price*b.qty),0) + 49,
    status: 'new',
    rider: null,
    time: new Date().toISOString()
  };
  
  try {
    if (db) {
      order.time = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('orders').add(order);
    } else {
      order.id = 'ORD-' + Date.now();
      const orders = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
      orders.unshift(order);
      localStorage.setItem(DB_KEY, JSON.stringify(orders));
    }
    
    cart = [];
    updateCart();
    alert("✅ Order Placed!\n\nTrack your order in 'My Orders'.");
    showOrders();
  } catch(error) {
    alert("❌ Error: " + error.message);
  }
}

function showOrders(){
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('cats').classList.add('hidden');
  document.getElementById('ordersView').classList.remove('hidden');
  document.getElementById('cartBar').classList.remove('visible');
  if(!db) loadLocalOrders();
  renderOrders();
}

function showMenu(){
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('cats').classList.remove('hidden');
  document.getElementById('ordersView').classList.add('hidden');
}

function renderOrders(){
  const list = document.getElementById('orderList');
  if(customerOrders.length===0) { 
    list.innerHTML='<p class="text-center text-slate-400 py-10">No orders yet</p>'; 
    return; 
  }
  
  list.innerHTML = customerOrders.map(o => `
    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
      <div class="flex justify-between mb-2">
        <span class="font-bold text-sm">${o.id ? o.id.substring(0,8) : 'Order'}</span>
        <span class="text-xs font-bold px-2 py-1 rounded ${getStatusColor(o.status)}">${o.status.toUpperCase()}</span>
      </div>
      <p class="text-xs text-slate-500">${o.items.length} items • ₱${o.total}</p>
      ${o.rider ? `<div class="mt-2 text-xs bg-blue-50 p-2 rounded text-blue-700">🛵 Rider: ${o.rider}</div>` : ''}
      <div class="mt-2 w-full bg-slate-200 rounded-full h-2">
        <div class="bg-orange-500 h-2 rounded-full" style="width: ${getStatusProgress(o.status)}%"></div>
      </div>
    </div>
  `).join('');
}

function getStatusColor(status) {
  const colors = {
    'new': 'bg-yellow-100 text-yellow-700',
    'preparing': 'bg-purple-100 text-purple-700',
    'out': 'bg-orange-100 text-orange-700',
    'delivered': 'bg-green-100 text-green-700'
  };
  return colors[status] || 'bg-slate-100 text-slate-700';
}

function getStatusProgress(status) {
  const progress = {'new': 25, 'preparing': 50, 'out': 75, 'delivered': 100};
  return progress[status] || 0;
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  const query = e.target.value.toLowerCase();
  const items = menu.filter(i => i.name.toLowerCase().includes(query));
  const grid = document.getElementById('menu');
  grid.innerHTML = items.map(i => `
    <div class="bg-white p-3 rounded-xl border border-slate-100 flex gap-3">
      <img src="${i.img}" class="w-20 h-20 rounded-lg object-cover bg-slate-100">
      <div class="flex-1">
        <h3 class="font-bold text-sm">${i.name}</h3>
        <p class="text-xs text-slate-500 mb-2">${i.desc || 'Delicious local food'}</p>
        <div class="flex justify-between items-center">
          <span class="font-bold text-orange-600">₱${i.price}</span>
          <button onclick="addToCart(${i.id})" class="bg-orange-100 text-orange-600 w-8 h-8 rounded-full flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
});

// Initialize
renderMenu();
if(!db) loadLocalOrders();
lucide.createIcons();
</script>

  }

  container.innerHTML = orders.map(o => `
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
      <div class="flex justify-between mb-2">
        <span class="font-bold">${o.id ? o.id.substring(0,8) : 'Order'}</span>
        <span class="font-bold text-green-600">₱50 fee</span>
      </div>
      <p class="text-sm text-slate-600 mb-1">📍 ${o.customer}</p>
      <p class="text-xs text-slate-500 mb-3">${o.address || 'No address'}</p>
      <p class="text-xs text-slate-500 mb-3">${o.items.length} items • ₱${o.total}</p>
      <button onclick="accept('${o.id}')" class="w-full bg-black text-white py-2 rounded-lg font-bold text-sm">Accept Job</button>
    </div>
  `).join('');
  lucide.createIcons();
}

async function accept(id) {
  if(!confirm('Accept this delivery job?')) return;
  
  const riderName = localStorage.getItem('riderName') || 'Rider';
  
  try {
    if (db) {
      await db.collection('orders').doc(id).update({
        status: 'out',
        rider: riderName,
        riderId: riderId,
        acceptedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      const orders = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
      const order = orders.find(o => o.id === id);
      if(order) {
        order.status = 'out';
        order.rider = riderName;
        localStorage.setItem(DB_KEY, JSON.stringify(orders));
      }
    }
    
    myEarnings += 50;
    myDeliveries++;
    document.getElementById('earnings').innerText = '₱' + myEarnings;
    document.getElementById('deliveryCount').innerText = myDeliveries;
    
    toast("✅ Job Accepted!");
    showActiveDelivery(id);
  } catch(error) {
    alert("❌ Error: " + error.message);
  }
}

function showActiveDelivery(id) {
  document.getElementById('jobs').innerHTML = `
    <div class="bg-green-50 border-2 border-green-500 p-4 rounded-xl">
      <p class="font-bold text-green-700 mb-2">🚚 Active Delivery</p>
      <p class="text-sm">Order: ${id.substring(0,8)}</p>
      <button onclick="completeDelivery('${id}')" class="w-full mt-3 bg-green-600 text-white py-2 rounded-lg font-bold text-sm">Mark as Delivered</button>
    </div>
  `;
}

async function completeDelivery(id) {
  if(!confirm('Mark as delivered?')) return;
  
  try {
    if (db) {
      await db.collection('orders').doc(id).update({
        status: 'delivered',
        deliveredAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      const orders = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
      const order = orders.find(o => o.id === id);
      if(order) {
        order.status = 'delivered';
        localStorage.setItem(DB_KEY, JSON.stringify(orders));
      }
    }
    
    toast("✅ Delivery completed! +₱50");
    document.getElementById('jobs').innerHTML = '<p class="text-center text-slate-400 text-sm">No new orders</p>';
  } catch(error) {
    alert("❌ Error: " + error.message);
  }
}

loadSettings();
lucide.createIcons();
</script>
