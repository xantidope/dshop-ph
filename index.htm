<!DOCTYPE html>
<html lang="en">
<head>

    <title>D-Shop PH - Food Delivery System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="text-center max-w-2xl">

        <h1 class="text-4xl font-bold mb-2">D-Shop PH</h1>
        <p class="text-gray-400 mb-8">Complete Food Delivery Solution</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="customer.html" class="bg-blue-600 hover:bg-blue-700 p-6 rounded-xl transition transform hover:scale-105">
